<app-header></app-header>
<main>
    <ul id="users">
        @for (user of users; track user.id) 
        {
            <li>
                <app-user [avatar]="user.avatar" [name]="user.name" [id]="user.id"
                (select)="selectUser($event)"/>
            </li>
        }
    </ul>

    @if (selectedUserId !== null && selectedUserId !== undefined )
    {
        <app-tasks [name]="selectedUserName()"/>
    }
</main>
