<app-card>
    <article>
    <h2>{{ task().title }}</h2>
    <!-- https://angular.dev/api/common/DatePipe -->
    <time>{{ task().dueDate | date :'mediumDate' }}</time>
    <summary>{{ task().summary }}</summary>
    <p class="actions">
        <button (click)="editTask()">Edit</button>
        <button (click)="completeTask()" color="success">Completed</button>
    </article>
</app-card>
