@if (isAddingTask()) 
{
    <app-new-task/>
}

<section id="tasks">
    <header>
        <h2>{{ name() }}'s Tasks:</h2>
        <menu>
            <button (click)="addTask()">Add</button>
            <button (click)="deleteTask()" color="danger">Delete</button>
        </menu>
    </header>
    <ul>
        @for (task of selectedUserTasks(); track task.id) 
        {
            <li>
                <app-task [task]="task" (complete)="onTaskComplete($event)" />
            </li>
        }
    </ul>
</section>
